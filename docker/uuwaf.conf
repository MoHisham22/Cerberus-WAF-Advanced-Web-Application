user  root;
worker_processes auto;
worker_cpu_affinity auto;
worker_rlimit_nofile 102400;

events {
    use epoll;
    accept_mutex off;
    worker_connections 102400;
}

pcre_jit on;
worker_shutdown_timeout 240s;

http {
    include resolver.conf;

    lua_shared_dict ipCache        16m;
    lua_shared_dict ipBlock        8m;
    lua_shared_dict stats          2m;
    lua_shared_dict db             32m;
    lua_shared_dict robot          16m;
    lua_shared_dict purge          4m;
    lua_shared_dict lock           2m;
    lua_shared_dict live           2m;
    lua_shared_dict search_engines 8m;
    lua_package_path '/uuwaf/?.w;/uuwaf/?/init.w;;';

    lua_ssl_trusted_certificate /etc/ssl/certs/ca-bundle.crt;
    lua_ssl_verify_depth 5;
    ssl_session_timeout  86400;

    lua_http10_buffering  off;
    lua_socket_log_errors off;

    lua_regex_match_limit 100000;
    lua_regex_cache_max_entries 8192;

    uninitialized_variable_warn off;

    log_format proxy '$remote_addr - $host [$time_local] "$request" $status $body_bytes_sent "$http_referer" "$http_user_agent" upstream: $upstream_addr request_time=$request_time upstream_time=$upstream_response_time';
    access_log off;

    sendfile          on;
    tcp_nopush        on;
    tcp_nodelay       on;
    keepalive_timeout 65s;

    client_header_buffer_size      16k;
    large_client_header_buffers  4 32k;
    client_max_body_size           0;
    proxy_cache_path /tmp/disk_cache_uuwaf levels=1:2 keys_zone=cache_zone:32m max_size=8g inactive=60m use_temp_path=off;

    server_tokens off;

    include mime.types;
    default_type  application/octet-stream;
    underscores_in_headers on;
    ignore_invalid_headers off;

    set_real_ip_from    172.31.254.0/24;
    real_ip_header      X-Forwarded-For;
    real_ip_recursive   on;

    upstream waf_backend {
        server 0.0.0.1;
        balancer_by_lua_block {
            waf.http_balancer_phase()
        }

        keepalive 320;
        keepalive_requests 1000;
        keepalive_timeout 60s;
    }


    init_by_lua_block {
        waf = require("waf")
        waf.http_init()
    }

    init_worker_by_lua_block {
        waf.http_init_worker()
    }

    server {
        include listen.conf;
        include gzip.conf;
        include ssl.conf;

        server_name _;

        location = /uuwaf/status {
            allow 127.0.0.0/8;
            deny all;
            stub_status;
        }

        ssl_certificate_by_lua_block {
            waf.http_ssl_phase()
        }

        location / {
            set $upstream_upgrade          '';
            set $upstream_connection       '';
            set $upstream_scheme           http;
            set $upstream_host             $host;
            set $skip_cache                0;
            set $purge_time                0;
            set $cache_time                0;

            rewrite_by_lua_block {
                waf.req_filter()
            }

            include proxy.conf;
            include cache.conf;

            header_filter_by_lua_block {
                waf.resp_header_filter()
            }

            body_filter_by_lua_block {
                waf.resp_body_filter()
            }

            log_by_lua_block {
                waf.http_log_phase()
            }
        }

        location /.well-known/acme-challenge/ {
            root /uuwaf/html/;
        }

        location @robot {
            proxy_set_header       X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header       Host               $host;
            proxy_pass http://127.0.0.1:777;
            header_filter_by_lua_block {
                waf.robot()
            }
        }

        include error_page.conf;
        include log.conf;
    }

    server {
        listen 4447 default_server reuseport;

        server_name _;

        location /uuwaf/admin {
            allow 127.0.0.0/8;
            deny all;

            content_by_lua_block {
                waf.http_admin()
            }
        }

        location /uuwaf/live {
            allow 127.0.0.0/8;
            deny all;

            content_by_lua_block {
                waf.http_live()
            }
        }
    }

}
